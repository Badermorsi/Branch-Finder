  areaList.innerHTML = "";
  result.innerHTML = "Delivery Branch will appear here";
}

  areaList.innerHTML = "";

  if (!city) {
    areaList.innerHTML = "<div style='padding:10px'>Select city first</div>";
    return;
  }

  const areas = [...new Set(
    data
      .filter(d => d.city === city)
      .map(d => d.area)
  )];

  const filtered = areas.filter(a =>
    a.toLowerCase().includes(input)
  );

  filtered.forEach(area => {

    const div = document.createElement("div");

    div.innerHTML = area;

    div.style.padding = "10px";
    div.style.cursor = "pointer";
    div.style.borderBottom = "1px solid #eee";

    div.onclick = () => {

      areaInput.value = area;
      areaList.innerHTML = "";

      const found = data.find(
        d => d.city === city && d.area === area
      );

      result.innerHTML = found
        ? "Delivery Branch: " + found.branch
        : "Not found";
    };

    areaList.appendChild(div);

  });
}

</script>

</body>
</html>
