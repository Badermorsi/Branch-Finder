<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delivery Lookup System</title>

<style>

body{
  font-family: Arial;
  background:#f4f4f4;
  padding:20px;
}

.container{
  max-width:650px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px #ccc;
}

.logo-banner{
  width:100%;
  height:220px;
  background:url('logo.png') center center no-repeat;
  background-size:contain;
  margin-bottom:10px;
}

select{
  width:100%;
  padding:12px;
  margin:10px 0;
  font-size:16px;
}

#areaInput{
  width:100%;
  padding:12px;
  margin:10px 0;
  font-size:16px;
  box-sizing:border-box;
  display:none;
}

#areaList{
  border:1px solid #ccc;
  max-height:200px;
  overflow-y:auto;
  background:white;
}

.result{
  margin-top:20px;
  padding:15px;
  background:#e8f5e9;
  border-left:5px solid green;
  font-weight:bold;
}

.area-item{
  padding:10px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}

.area-item:hover{
  background:#f2f2f2;
}

</style>
</head>

<body>

<div class="container">

<div class="logo-banner"></div>

<select id="city" onchange="loadAreas()">
  <option value="">Select City</option>
</select>

<input
  type="text"
  id="areaInput"
  placeholder="Search Area..."
  oninput="filterAreas()"
>

<div id="areaList"></div>

<div class="result" id="result">
  Delivery Branch will appear here
</div>

</div>

<script>

// ================= FULL DATA =================

const data = [

/* ================= Al Ain ================= */

{ city:"Al Ain", area:"Ain Al Fayda", branch:"Falaj 2" },
{ city:"Al Ain", area:"Ameriah", branch:"Sama" },
{ city:"Al Ain", area:"Aqabiya (Iqabiyyah)", branch:"Falaj 2" },

/* ================= Abu Dhabi ================= */

{ city:"Abu Dhabi", area:"AbuDhabi Airport", branch:"Al-Zeina (AD)" },
{ city:"Abu Dhabi", area:"AbuDhabi Industrial City", branch:"Rabdan 2 (AD)" },
{ city:"Abu Dhabi", area:"Al-Danah", branch:"Adnoc (AD)" },

/* ================= Dubai ================= */

{ city:"Dubai", area:"Abu Hail", branch:"SZR (DXB)" },
{ city:"Dubai", area:"Academic city", branch:"Souq Extra (DXB)" },
{ city:"Dubai", area:"Al-Bada", branch:"SZR (DXB)" },

/* ================= All Areas ================= */

{ city:"All areas (including Remote area)", area:"Al-Bada", branch:"SZR (DXB)" },
{ city:"All areas (including Remote area)", area:"Sharjah", branch:"Remote" }

];

// ================= INIT =================

const citySelect = document.getElementById("city");
const areaInput = document.getElementById("areaInput");
const areaList = document.getElementById("areaList");
const result = document.getElementById("result");

// Load unique cities

const cities = [...new Set(data.map(item => item.city))];

cities.forEach(city => {

  const option = document.createElement("option");

  option.value = city;
  option.textContent = city;

  citySelect.appendChild(option);

});

// ================= LOAD AREAS =================

function loadAreas(){

  const city = citySelect.value;

  areaInput.value = "";
  areaList.innerHTML = "";

  result.innerHTML = "Delivery Branch will appear here";

  if(city === ""){

    areaInput.style.display = "none";

  } else {

    areaInput.style.display = "block";

    filterAreas();

  }

}

// ================= FILTER AREAS =================

function filterAreas(){

  const city = citySelect.value;

  const input = areaInput.value.toLowerCase();

  areaList.innerHTML = "";

  if(!city) return;

  const areas = [
    ...new Set(
      data
      .filter(item => item.city === city)
      .map(item => item.area)
    )
  ];

  const filteredAreas = areas.filter(area =>
    area.toLowerCase().includes(input)
  );

  filteredAreas.forEach(area => {

    const div = document.createElement("div");

    div.className = "area-item";

    div.textContent = area;

    div.onclick = function(){

      areaInput.value = area;

      areaList.innerHTML = "";

      const found = data.find(item =>
        item.city === city &&
        item.area === area
      );

      if(found){

        result.innerHTML =
          "Delivery Branch: " + found.branch;

      } else {

        result.innerHTML = "Not found";

      }

    };

    areaList.appendChild(div);

  });

}

</script>

</body>
</html>
